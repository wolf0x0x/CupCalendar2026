name: Content and i18n Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      DEEPL_API_URL: https://api-free.deepl.com/v2/translate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Sync RSS content and translations
        run: npm run content:i18n
      - name: Build static site
        run: npm run build
      - name: Commit content sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news_raw.json data/news_translated.json data/news.json data/translation_cache.json data/translation_queue.json data/site.json
          if git diff --cached --quiet; then
            echo "No content or i18n data changes."
            exit 0
          fi
          git commit -m "[auto] content+i18n sync $(date -u '+%Y-%m-%d %H:%M UTC')"
      - name: Push content sync
        run: |
          git pull --rebase origin main
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
